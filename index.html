<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="heading">
            <span>Calculator</span>
        </div>
        <div class="parent-box">
    <div class="container">
        
        <div id="result">
            <span class="cursor"></span>
        </div>
        <div class="op-btns">
            <button id="Ac">AC</button>
            <button id="negation">+/-</button>
            <button id="percentage">%</button>
            <button id="divide" style="background-color: rgb(226, 152, 14);">/</button>
        </div>
    
    <div class="mulitplication">
        <button id="seven">7</button>
        <button id="eight">8</button>
        <button id="nine">9</button>
        <button id="multiply" style="background-color: rgb(226, 152, 14);">x</button>
    </div>



    <div class="subtraction">
        <button id="four">4</button>
        <button id="five">5</button>
        <button id="six">6</button>
        <button id="subtract" style="background-color: rgb(226, 152, 14);">-</button>
    </div>


    <div class="addition">
        <button id="one">1</button>
        <button id="two">2</button>
        <button id="three">3</button>
        <button id="add" style="background-color: rgb(226, 152, 14);">+</button>
    </div>

    <div class="answer">
        <button id="doublezeroes">00</button>
        <button id="zero">0</button>
        <button id="decimal">.</button>
        <button id="eqto" style="background-color: rgb(226, 152, 14);">=</button>
    </div>
    </div>
    </div>



    <script src="script.js"></script>
</body>
</html>
